apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-app
  template:
    metadata:
      labels:
        app: cicd-app
    spec:
      containers:
      - name: cicd-app
        image: ghcr.io/devchaudhary666/cicd-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-app-svc
  namespace: production
spec:
  type: NodePort
  selector:
    app: cicd-app
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
